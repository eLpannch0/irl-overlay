<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>IRL Overlay PRO</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:transparent;
    font-family:Arial, sans-serif;
}

#hud{
    position:absolute;
    top:35px;
    left:35px;

    background:rgba(0,0,0,0.88);

    padding:18px 24px;

    border-radius:22px;

    color:white;

    min-width:220px;

    box-shadow:
    0 0 25px rgba(0,0,0,0.45);

    border:2px solid rgba(255,255,255,0.08);
}

.topline{
    display:flex;
    align-items:center;
    gap:10px;

    font-size:28px;
    font-weight:700;

    margin-bottom:10px;
}

.live-dot{
    width:14px;
    height:14px;
    background:#ff2d2d;
    border-radius:50%;

    box-shadow:
    0 0 12px #ff2d2d;

    animation:pulse 1.5s infinite;
}

.city{
    color:#ffffff;
}

#clock{
    font-size:74px;
    font-weight:900;

    line-height:1;

    letter-spacing:1px;

    text-shadow:
    0 0 12px rgba(255,255,255,0.18);

    margin-bottom:12px;
}

#temp{
    font-size:34px;
    font-weight:700;

    color:#f2f2f2;
}

@keyframes pulse{
    0%{
        transform:scale(1);
        opacity:1;
    }

    50%{
        transform:scale(1.15);
        opacity:0.7;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }
}
</style>
</head>

<body>

<div id="hud">

    <div class="topline">
        <div class="live-dot"></div>
        <div>LIVE</div>
        <div class="city">Ottawa</div>
    </div>

    <div id="clock">14:17</div>

    <div id="temp">13°C</div>

</div>

<script>

function updateClock(){

    const now = new Date();

    let hours = now.getHours().toString().padStart(2,'0');
    let minutes = now.getMinutes().toString().padStart(2,'0');

    document.getElementById('clock').innerText =
    `${hours}:${minutes}`;
}

updateClock();

setInterval(updateClock,1000);

async function updateWeather(){

    try{

        const response = await fetch(
        'https://api.open-meteo.com/v1/forecast?latitude=45.4215&longitude=-75.6972&current_weather=true');

        const data = await response.json();

        const temp =
        Math.round(data.current_weather.temperature);

        document.getElementById('temp').innerText =
        `${temp}°C`;

    }catch(e){

        document.getElementById('temp').innerText =
        '--°C';
    }
}

updateWeather();

setInterval(updateWeather,300000);

</script>

</body>
</html>
